spring.application.name=payment-service
server.port=4003

# Database Configuration
spring.datasource.url=jdbc:postgresql://ep-dark-meadow-ao8rgvqg-pooler.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_SpcrTeP0l2uy
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# gRPC Server Configuration
grpc.server.port=9090
grpc.server.enable-keep-alive=true
grpc.server.keep-alive-time=30s
grpc.server.keep-alive-timeout=5s
grpc.server.permit-keep-alive-without-calls=true

# Sepay Configuration
sepay.account-number=0818927019
sepay.bank=MBBank
sepay.webhook.api-key=unihub_webhook_secret_key_2025_dev_v1

# RabbitMQ Configuration
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:admin}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:admin}
spring.rabbitmq.virtual-host=${RABBITMQ_VIRTUAL_HOST:/}

# Redis Configuration
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=2000ms
spring.redis.jedis.pool.max-active=8
spring.redis.jedis.pool.max-idle=8
spring.redis.jedis.pool.min-idle=0

# Payment resilience configuration
payment.resilience.enabled=true
payment.resilience.timeout-ms=600000
payment.resilience.max-retries=3
payment.resilience.initial-backoff-ms=200
payment.resilience.backoff-multiplier=2.0
payment.resilience.max-backoff-ms=3000
payment.resilience.jitter-factor=0.3
payment.resilience.failure-threshold=5
payment.resilience.open-state-duration-ms=10000
